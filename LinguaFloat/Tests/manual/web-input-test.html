<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Floatype Web Input Test</title>
  <style>
    body {
      font: 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 40px;
    }
    textarea {
      width: 720px;
      height: 180px;
      font: 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 12px;
    }
  </style>
</head>
<body>
  <h1>Floatype（浮译） Web Input Test</h1>
  <textarea id="target" autofocus placeholder="Focus here, open Floatype, then insert output"></textarea>
  <script>
    window.addEventListener("load", () => {
      const target = document.getElementById("target");
      target.focus();
      target.value = "";
    });
  </script>
</body>
</html>
